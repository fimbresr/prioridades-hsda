<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#3C5876" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Prioridades HSDA" />
<title>Prioridades · HSDA</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-180.png" />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // Fuerza el runtime clásico de JSX (usa el React global del UMD).
  // Evita que Babel inyecte `import react/jsx-runtime`, que rompe el render en navegador.
  Babel.registerPreset("hsda-react", { presets: [[Babel.availablePresets.react, { runtime: "classic" }]] });
</script>

<style>
  @font-face { font-family: "Avenir"; src: url("assets/avenir-light.ttf") format("truetype"); font-weight: 300; font-display: swap; }
  @font-face { font-family: "Avenir"; src: url("assets/avenir-medium.ttf") format("truetype"); font-weight: 500; font-display: swap; }
  @font-face { font-family: "Avenir"; src: url("assets/avenir-black.ttf") format("truetype"); font-weight: 800; font-display: swap; }

  :root {
    --brand: #3C5876;
    --brand-deep: #2c4258;
    --brand-soft: #6f8aa6;

    --bg: #eef1f5;
    --bg-grad-a: #f7f9fb;
    --bg-grad-b: #e4e9f0;
    --card: #ffffff;
    --input-bg: #fafbfd;
    --ink: #2a3a4d;
    --ink-soft: #6a7b8e;
    --ink-faint: #9aa8b8;
    --line: #e6ebf1;
    --track: #e9eef4;

    --do:    #d1495b;  --do-deep:    #ab2e3f;  --do-soft:    #fbeaec;
    --plan:  #3C5876;  --plan-deep:  #2c4258;  --plan-soft:  #e9eef5;
    --deleg: #b07c45;  --deleg-deep: #8c6035;  --deleg-soft: #f6eee2;
    --del:   #8493a3;  --del-deep:   #65727f;  --del-soft:   #eef1f4;

    --shadow-sm: 0 2px 10px rgba(44,66,88,0.06);
    --shadow-md: 0 18px 50px -20px rgba(44,66,88,0.28);
  }

  body[data-theme="dark"] {
    --brand: #7fa0c0;
    --brand-deep: #5d7d9c;
    --brand-soft: #6c8298;

    --bg: #0e1721;
    --bg-grad-a: #17242f;
    --bg-grad-b: #0a121a;
    --card: #18242f;
    --input-bg: #121d27;
    --ink: #e7eef5;
    --ink-soft: #a3b4c4;
    --ink-faint: #6f8090;
    --line: #273543;
    --track: #243341;

    --do:    #e2697a;  --do-deep:    #b9485a;  --do-soft:    #2a1a1e;
    --plan:  #7fa0c0;  --plan-deep:  #5d7d9c;  --plan-soft:  #18242f;
    --deleg: #d29a5f;  --deleg-deep: #a87544;  --deleg-soft: #271f15;
    --del:   #93a1b0;  --del-deep:   #6f8090;  --del-soft:   #1b242d;

    --shadow-sm: 0 2px 10px rgba(0,0,0,0.35);
    --shadow-md: 0 18px 50px -20px rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Avenir", system-ui, sans-serif;
    font-weight: 500;
    color: var(--ink);
    background: var(--bg);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100dvh; }

  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 28px);
    background: radial-gradient(130% 60% at 50% -5%, var(--bg-grad-a), var(--bg-grad-b) 95%);
    position: relative;
  }
  .shell { width: 100%; max-width: 540px; display: flex; flex-direction: column; }

  /* Header */
  .topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo-h { height: 32px; width: auto; display: block; }
  .topbar-actions { display: flex; gap: 10px; }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 13px; border: 1px solid var(--line);
    background: var(--card); color: var(--brand); display: grid; place-items: center;
    cursor: pointer; box-shadow: var(--shadow-sm); transition: transform .25s, background .2s;
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 20px; height: 20px; }

  .lead { margin: 2px 2px 16px; }
  .lead h1 { font-family: "Avenir"; font-weight: 800; font-size: 1.45rem; letter-spacing: -.02em; }
  .lead p { color: var(--ink-soft); font-size: .9rem; margin-top: 3px; }

  /* Tabs */
  .tabs { display: flex; gap: 3px; padding: 4px; border-radius: 100px; background: var(--card); border: 1px solid var(--line); box-shadow: var(--shadow-sm); margin-bottom: 20px; }
  .tab { flex: 1; border: 0; background: transparent; color: var(--ink-soft); font-family: inherit; font-weight: 500; font-size: .82rem; padding: 10px 8px; border-radius: 100px; cursor: pointer; transition: color .2s, background .2s; display: inline-flex; align-items: center; justify-content: center; gap: 7px; }
  .tab svg { width: 16px; height: 16px; }
  .tab.active { background: var(--brand); color: #fff; box-shadow: 0 4px 12px -3px var(--brand); }
  .tab .count { font-size: .72rem; background: rgba(0,0,0,.08); border-radius: 100px; padding: 1px 7px; min-width: 20px; }
  .tab.active .count { background: rgba(255,255,255,.22); }

  /* Quick add */
  .quickadd { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 14px; box-shadow: var(--shadow-sm); margin-bottom: 18px; }
  .qa-row { display: flex; gap: 10px; }
  .qa-input { flex: 1; border: 1px solid var(--line); background: var(--input-bg); color: var(--ink); border-radius: 13px; padding: 13px 14px; font-family: inherit; font-weight: 500; font-size: .95rem; outline: none; transition: border-color .2s; }
  .qa-input:focus { border-color: var(--brand); }
  .qa-add { border: 0; background: var(--brand); color: #fff; border-radius: 13px; width: 50px; display: grid; place-items: center; cursor: pointer; box-shadow: 0 6px 16px -6px var(--brand); transition: transform .2s; }
  .qa-add:active { transform: scale(.93); }
  .qa-add svg { width: 22px; height: 22px; }
  .qa-extra { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .qa-extra input { flex: 1 1 140px; min-width: 0; max-width: 100%; border: 1px solid var(--line); background: var(--input-bg); color: var(--ink); border-radius: 11px; padding: 9px 11px; font-family: inherit; font-size: .82rem; outline: none; }
  .qa-extra input:focus { border-color: var(--brand); }
  .qa-mins { flex: 1 1 130px; min-width: 0; display: flex; align-items: center; gap: 7px; border: 1px solid var(--line); background: var(--input-bg); color: var(--ink-soft); border-radius: 11px; padding: 0 11px; }
  .qa-mins svg { width: 15px; height: 15px; flex-shrink: 0; }
  .qa-mins select { flex: 1; min-width: 0; border: 0; background: transparent; color: var(--ink); font-family: inherit; font-size: .82rem; padding: 9px 0; outline: none; cursor: pointer; }
  .qa-hint { font-size: .76rem; color: var(--ink-faint); margin-top: 9px; }
  .mins-pill { display: inline-flex; align-items: center; gap: 4px; color: var(--brand); font-weight: 800; }
  .mins-pill svg { width: 12px; height: 12px; }

  /* Inbox strip / lists */
  .section-title { font-size: .78rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-faint); margin: 4px 4px 10px; display: flex; align-items: center; gap: 8px; }
  .section-title svg { width: 15px; height: 15px; flex-shrink: 0; }
  .day-ctrl label svg { width: 16px; height: 16px; flex-shrink: 0; }
  .agenda-time svg { width: 20px; height: 20px; }
  .inbox-strip { background: var(--card); border: 1px dashed var(--line); border-radius: 18px; padding: 12px; margin-bottom: 18px; box-shadow: var(--shadow-sm); }
  .chips { display: flex; flex-direction: column; gap: 8px; }

  /* Task chip */
  .chip { display: flex; align-items: center; gap: 10px; background: var(--input-bg); border: 1px solid var(--line); border-radius: 13px; padding: 10px 11px; cursor: grab; transition: transform .12s, box-shadow .2s, opacity .2s; }
  .chip:active { cursor: grabbing; }
  .chip.dragging { opacity: .4; }
  .chip .grip { color: var(--ink-faint); display: grid; place-items: center; flex-shrink: 0; }
  .chip .grip svg { width: 16px; height: 16px; }
  .chip .body { flex: 1; min-width: 0; }
  .chip .ttl { font-size: .92rem; font-weight: 500; color: var(--ink); overflow-wrap: anywhere; }
  .chip.done .ttl { text-decoration: line-through; color: var(--ink-faint); }
  .chip .meta { font-size: .74rem; color: var(--ink-soft); margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .chip .due { display: inline-flex; align-items: center; gap: 4px; }
  .chip .due.late { color: var(--do); font-weight: 800; }
  .chip .due svg { width: 12px; height: 12px; }
  .chip .acts { display: flex; gap: 5px; flex-shrink: 0; }
  .mini { width: 32px; height: 32px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); display: grid; place-items: center; cursor: pointer; transition: transform .15s, color .2s, background .2s; }
  .mini:active { transform: scale(.9); }
  .mini svg { width: 15px; height: 15px; }
  .mini.ok:hover, .mini.ok.on { color: #fff; background: var(--plan); border-color: var(--plan); }

  /* Matriz con ejes Importante/Urgente (layout tipo tabla) */
  .matrix-table { display: grid; grid-template-columns: 26px minmax(0,1fr) minmax(0,1fr); grid-template-rows: auto auto auto; gap: 8px; }
  .mt-corner { grid-column: 1; grid-row: 1; }
  .mt-colhead { grid-row: 1; display: grid; place-items: center; }
  .mt-colhead:nth-of-type(2) { grid-column: 2; }
  .mt-colhead:nth-of-type(3) { grid-column: 3; }
  .mt-rowhead { grid-column: 1; display: grid; place-items: center; }
  /* pastillas de eje resaltadas */
  .ax-pill { font-size: .62rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; border-radius: 100px; padding: 5px 8px; white-space: nowrap; box-shadow: 0 2px 6px -2px rgba(0,0,0,.25); }
  .ax-pill.important   { background: var(--do);    color: #fff; }
  .ax-pill.noimportant { background: var(--del);   color: #fff; }
  .ax-pill.urgent      { background: var(--do-deep); color: #fff; }
  .ax-pill.nourgent    { background: var(--plan-deep); color: #fff; }
  .mt-colhead .ax-pill { writing-mode: horizontal-tb; }
  .mt-rowhead .ax-pill { writing-mode: vertical-rl; transform: rotate(180deg); }
  .quad { min-width: 0; border-radius: 18px; padding: 12px; min-height: 150px; border: 1.5px solid var(--qline); background: var(--qsoft); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; transition: outline .15s, transform .15s; }
  .quad.q-do    { --qc: var(--do);    --qd: var(--do-deep);    --qsoft: var(--do-soft);    --qline: color-mix(in srgb, var(--do) 30%, transparent); }
  .quad.q-plan  { --qc: var(--plan);  --qd: var(--plan-deep);  --qsoft: var(--plan-soft);  --qline: color-mix(in srgb, var(--plan) 30%, transparent); }
  .quad.q-deleg { --qc: var(--deleg); --qd: var(--deleg-deep); --qsoft: var(--deleg-soft); --qline: color-mix(in srgb, var(--deleg) 30%, transparent); }
  .quad.q-del   { --qc: var(--del);   --qd: var(--del-deep);   --qsoft: var(--del-soft);   --qline: color-mix(in srgb, var(--del) 35%, transparent); }
  .quad.over { outline: 2.5px dashed var(--qc); outline-offset: 2px; transform: translateY(-2px); }
  .quad-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; gap: 6px; }
  .quad-num { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 7px; font-size: .68rem; font-weight: 800; color: #fff; background: var(--qc); margin-right: 6px; vertical-align: middle; }
  .quad-tag { display: inline-flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 800; letter-spacing: .03em; color: #fff; background: var(--qc); padding: 4px 9px; border-radius: 100px; }
  .quad-tag svg { width: 12px; height: 12px; }
  .quad-sub { font-size: .68rem; color: var(--qd); font-weight: 500; opacity: .85; }
  .quad-n { font-size: .8rem; font-weight: 800; color: var(--qd); background: #fff3; border-radius: 100px; padding: 1px 8px; }
  body[data-theme="dark"] .quad-n { background: #ffffff14; }
  .quad .chips { gap: 7px; }
  .quad-empty { font-size: .76rem; color: var(--qd); opacity: .6; text-align: center; padding: 16px 4px; font-style: italic; }

  /* Tarjeta colapsable de la matriz */
  .mchip { background: var(--card); border: 1px solid var(--line); border-radius: 11px; overflow: hidden; transition: box-shadow .2s; }
  .mchip.open { box-shadow: var(--shadow-sm); border-color: var(--qline); }
  .mchip.dragging { opacity: .4; }
  .mchip-row { display: flex; align-items: center; gap: 7px; padding: 8px 9px; cursor: pointer; }
  .mchip-row .grip { color: var(--ink-faint); display: grid; place-items: center; flex-shrink: 0; }
  .mchip-row .grip svg { width: 14px; height: 14px; }
  .mtitle { flex: 1; min-width: 0; font-size: .85rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mchip.open .mtitle { color: var(--qd); font-weight: 800; }
  .mchip.done .mtitle { text-decoration: line-through; color: var(--ink-faint); }
  .mchip-fulltitle { font-size: .92rem; font-weight: 800; line-height: 1.25; color: var(--ink); margin-bottom: 8px; overflow-wrap: anywhere; }
  .mchip.done .mchip-fulltitle { text-decoration: line-through; color: var(--ink-faint); }
  .late-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--do); flex-shrink: 0; }
  .mmins { font-size: .66rem; font-weight: 800; color: var(--qd); background: color-mix(in srgb, var(--qc) 16%, transparent); border-radius: 100px; padding: 2px 6px; flex-shrink: 0; }
  .chev { color: var(--ink-faint); display: grid; place-items: center; flex-shrink: 0; }
  .chev svg { width: 14px; height: 14px; }
  .mchip-detail { padding: 0 9px 9px; }
  .mchip-detail .meta { font-size: .74rem; color: var(--ink-soft); margin-bottom: 9px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mchip-detail .due { display: inline-flex; align-items: center; gap: 4px; }
  .mchip-detail .due.late { color: var(--do); font-weight: 800; }
  .mchip-detail .due svg { width: 12px; height: 12px; }
  .mchip-acts { display: flex; gap: 5px; flex-wrap: wrap; }
  .mact { width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); display: grid; place-items: center; cursor: pointer; transition: transform .15s; }
  .mact:active { transform: scale(.9); }
  .mact svg { width: 14px; height: 14px; }
  .mact.q-do    { color: var(--do); }
  .mact.q-plan  { color: var(--plan); }
  .mact.q-deleg { color: var(--deleg); }
  .mact.q-del   { color: var(--del); }
  .mact.ok      { color: var(--plan); }
  .mact.danger  { color: var(--do); }

  /* Mi día */
  .day-ctrl { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; box-shadow: var(--shadow-sm); margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .day-ctrl label { font-size: .82rem; color: var(--ink-soft); display: flex; align-items: center; gap: 8px; }
  .day-ctrl input { border: 1px solid var(--line); background: var(--input-bg); color: var(--ink); border-radius: 10px; padding: 7px 10px; font-family: inherit; font-size: .85rem; outline: none; }
  .day-block { margin-bottom: 20px; }
  .agenda-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--ac); border-radius: 13px; padding: 11px 13px; margin-bottom: 8px; box-shadow: var(--shadow-sm); }
  .agenda-item.done { opacity: .55; }
  .agenda-time { font-family: "Avenir"; font-weight: 800; font-size: .95rem; color: var(--ac); min-width: 52px; text-align: center; line-height: 1.1; }
  .agenda-time small { display: block; font-size: .62rem; font-weight: 500; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .04em; }
  .agenda-body { flex: 1; min-width: 0; }
  .agenda-body .ttl { font-size: .93rem; }
  .agenda-item.done .ttl { text-decoration: line-through; color: var(--ink-faint); }
  .agenda-body .meta { font-size: .74rem; color: var(--ink-soft); margin-top: 2px; }

  .empty { text-align: center; color: var(--ink-faint); padding: 40px 20px; }
  .empty svg { width: 46px; height: 46px; opacity: .5; margin-bottom: 12px; }
  .empty p { font-size: .9rem; }

  /* Action sheet (mobile) */
  .sheet-bg { position: fixed; inset: 0; background: rgba(20,30,42,.45); backdrop-filter: blur(2px); display: flex; align-items: flex-end; justify-content: center; z-index: 50; animation: fade .2s; }
  @keyframes fade { from { opacity: 0; } }
  .sheet { width: 100%; max-width: 540px; background: var(--card); border-radius: 22px 22px 0 0; padding: 18px 16px calc(env(safe-area-inset-bottom) + 18px); box-shadow: 0 -10px 40px rgba(0,0,0,.25); animation: rise .28s cubic-bezier(.2,.9,.3,1); }
  @keyframes rise { from { transform: translateY(100%); } }
  .sheet h3 { font-size: 1rem; font-weight: 800; margin-bottom: 3px; overflow-wrap: anywhere; }
  .sheet .sub { font-size: .8rem; color: var(--ink-soft); margin-bottom: 14px; }
  .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 9px; }
  .sheet-opt { border: 1.5px solid var(--qline); background: var(--qsoft); color: var(--qd); border-radius: 14px; padding: 12px; font-family: inherit; font-weight: 800; font-size: .82rem; cursor: pointer; text-align: left; display: flex; flex-direction: column; gap: 3px; transition: transform .15s; }
  .sheet-opt:active { transform: scale(.96); }
  .sheet-opt small { font-weight: 500; font-size: .68rem; opacity: .8; }
  .sheet-opt .sheet-q { display: inline-grid; place-items: center; width: 18px; height: 18px; border-radius: 6px; font-size: .62rem; font-weight: 800; color: #fff; background: var(--qc); margin-right: 6px; }
  .sheet-opt.q-do    { --qc: var(--do);    --qd: var(--do-deep);    --qsoft: var(--do-soft);    --qline: color-mix(in srgb, var(--do) 30%, transparent); }
  .sheet-opt.q-plan  { --qc: var(--plan);  --qd: var(--plan-deep);  --qsoft: var(--plan-soft);  --qline: color-mix(in srgb, var(--plan) 30%, transparent); }
  .sheet-opt.q-deleg { --qc: var(--deleg); --qd: var(--deleg-deep); --qsoft: var(--deleg-soft); --qline: color-mix(in srgb, var(--deleg) 30%, transparent); }
  .sheet-opt.q-del   { --qc: var(--del);   --qd: var(--del-deep);   --qsoft: var(--del-soft);   --qline: color-mix(in srgb, var(--del) 35%, transparent); }
  .sheet-row { display: flex; gap: 9px; margin-top: 4px; }
  .sheet-btn { flex: 1; border: 1px solid var(--line); background: var(--input-bg); color: var(--ink); border-radius: 13px; padding: 12px; font-family: inherit; font-weight: 500; font-size: .85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .sheet-btn svg { width: 16px; height: 16px; }
  .sheet-btn.danger { color: var(--do); }
  .sheet-close { width: 100%; margin-top: 9px; border: 0; background: transparent; color: var(--ink-faint); font-family: inherit; font-size: .85rem; padding: 8px; cursor: pointer; }

  /* Calendario */
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
  .cal-month { font-weight: 800; font-size: 1.05rem; letter-spacing: -.01em; }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav-btn { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--line); background: var(--card); color: var(--ink-soft); display: grid; place-items: center; cursor: pointer; transition: transform .15s, color .2s; }
  .cal-nav-btn:active { transform: scale(.9); }
  .cal-nav-btn svg { width: 16px; height: 16px; }
  .cal-nav-btn.today { width: auto; padding: 0 12px; font-size: .78rem; font-weight: 800; color: var(--brand); }

  .cal-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 12px; box-shadow: var(--shadow-sm); margin-bottom: 18px; }
  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .cal-wd { text-align: center; font-size: .68rem; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; color: var(--ink-faint); padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell { aspect-ratio: 1 / 1; min-height: 38px; border-radius: 10px; border: 1.5px solid transparent; background: var(--input-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: border-color .15s, background .2s, transform .12s; position: relative; }
  .cal-cell:active { transform: scale(.94); }
  .cal-cell.out { opacity: .35; }
  .cal-cell .dnum { font-size: .82rem; font-weight: 500; color: var(--ink-soft); }
  .cal-cell.has .dnum { font-weight: 800; color: var(--ink); }
  .cal-cell.sel { border-color: var(--brand); background: color-mix(in srgb, var(--brand) 12%, var(--card)); box-shadow: 0 4px 14px -6px var(--brand); }
  .cal-cell.sel .dnum { color: var(--brand); }
  .cal-cell.today .dnum { color: var(--do); }
  .cal-cell.today.sel .dnum { color: var(--brand); }
  .cal-cell .dots { display: flex; gap: 2px; height: 5px; }
  .cal-cell .dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-cell .dot.do    { background: var(--do); }
  .cal-cell .dot.plan  { background: var(--plan); }
  .cal-cell .dot.deleg { background: var(--deleg); }
  .cal-cell .dot.del   { background: var(--del); }

  .cal-legend { display: flex; flex-wrap: wrap; gap: 10px 14px; margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .cal-legend-item { display: inline-flex; align-items: center; gap: 5px; font-size: .72rem; color: var(--ink-soft); }
  .cal-legend-item .sw { width: 9px; height: 9px; border-radius: 50%; }
  .cal-legend-item .sw.do    { background: var(--do); }
  .cal-legend-item .sw.plan  { background: var(--plan); }
  .cal-legend-item .sw.deleg { background: var(--deleg); }
  .cal-legend-item .sw.del   { background: var(--del); }

  .cal-day-title { display: flex; align-items: baseline; gap: 8px; margin: 2px 2px 12px; }
  .cal-day-title .big { font-weight: 800; font-size: 1.1rem; }
  .cal-day-title .small { font-size: .8rem; color: var(--ink-soft); }
  .cal-day-title .n { margin-left: auto; font-size: .72rem; font-weight: 800; color: var(--ink-faint); background: var(--card); border: 1px solid var(--line); border-radius: 100px; padding: 2px 9px; }

  .foot { text-align: center; font-size: .72rem; color: var(--ink-faint); margin-top: 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="hsda-react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------------- Iconos ---------------- */
const I = {
  plus:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  check:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12l5 5L20 6"/></svg>,
  trash:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>,
  moon:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>,
  sun:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8 6 18M18 6l1.8-1.8"/></svg>,
  grip:    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>,
  grid:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
  cal:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>,
  inbox:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 13h4l2 3h6l2-3h4M3 13l3-8h12l3 8v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>,
  clock:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  bolt:    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>,
  star:    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 5.9 6.6.9-4.8 4.6 1.1 6.5L12 18.5 6.2 21l1.1-6.5L2.5 9.9l6.6-.9z"/></svg>,
  hand:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13V8a2 2 0 0 1 4 0M9 13V6a2 2 0 0 1 4 0v6M13 13V8a2 2 0 0 1 4 0v6a6 6 0 0 1-6 6H9a5 5 0 0 1-4-2l-2-3a1.5 1.5 0 0 1 2.4-1.8L7 13"/></svg>,
  undo:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6M3 13a9 9 0 1 0 3-7.7"/></svg>,
  chevD:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>,
  chevU:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 15l6-6 6 6"/></svg>,
  chevL:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
  chevR:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>,
  month:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18M8 3v4M16 3v4"/><circle cx="7.5" cy="13.5" r=".7" fill="currentColor" stroke="none"/><circle cx="12" cy="13.5" r=".7" fill="currentColor" stroke="none"/><circle cx="16.5" cy="13.5" r=".7" fill="currentColor" stroke="none"/><circle cx="7.5" cy="17" r=".7" fill="currentColor" stroke="none"/><circle cx="12" cy="17" r=".7" fill="currentColor" stroke="none"/></svg>,
};

/* Opciones de duración estimada (minutos) */
const MINS = [5, 10, 15, 30, 45, 60, 90, 120];
const fmtMins = (m) => m >= 60 ? (m % 60 === 0 ? (m/60) + " h" : Math.floor(m/60) + " h " + (m%60) + " m") : m + " min";

/* ---------------- Cuadrantes ---------------- */
/* Modelo clásico de Eisenhower:
   Eje vertical = Importante (arriba) / No importante (abajo)
   Eje horizontal = Urgente (derecha) / No urgente (izquierda)
   Q1 = Hacer ya  (urgente + importante)     — arriba derecha
   Q2 = Agendar   (importante + no urgente)  — arriba izquierda
   Q3 = Delegar   (urgente + no importante)  — abajo derecha
   Q4 = Eliminar  (no urgente + no importante)— abajo izquierda
   Al soltar una tarea en un cuadrante se asigna automáticamente su clasificación. */
const QUADS = {
  do:    { key:"do",    num:1, label:"HACER YA",  sub:"Urgente · Importante",      icon:I.bolt,  cls:"q-do",    urgent:true,  important:true  },
  plan:  { key:"plan",  num:2, label:"AGENDAR",   sub:"Importante · No urgente",   icon:I.star,  cls:"q-plan",  urgent:false, important:true  },
  deleg: { key:"deleg", num:3, label:"DELEGAR",   sub:"Urgente · No importante",   icon:I.hand,  cls:"q-deleg", urgent:true,  important:false },
  del:   { key:"del",   num:4, label:"ELIMINAR",  sub:"Ni urgente ni importante",  icon:I.trash, cls:"q-del",   urgent:false, important:false },
};
const QUAD_ORDER = ["do","plan","deleg","del"];

/* ---------------- Persistencia ---------------- */
const STORE = "prioridades-hsda-v1";
const load = () => { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } };
const save = (t) => { try { localStorage.setItem(STORE, JSON.stringify(t)); } catch {} };

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const buzz = (ms=14) => { try { navigator.vibrate && navigator.vibrate(ms); } catch {} };

/* fecha límite legible + si está vencida */
function dueInfo(due) {
  if (!due) return null;
  const d = new Date(due);
  if (isNaN(d)) return null;
  const now = new Date();
  const late = d < now;
  const sameDay = d.toDateString() === now.toDateString();
  const opts = sameDay ? { hour:"2-digit", minute:"2-digit" } : { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" };
  return { text: (sameDay ? "Hoy " : "") + d.toLocaleString("es-MX", opts), late };
}

/* ordena por fecha límite (sin fecha al final) */
const byDue = (a, b) => {
  const da = a.due ? new Date(a.due).getTime() : Infinity;
  const db = b.due ? new Date(b.due).getTime() : Infinity;
  if (da !== db) return da - db;
  return a.order - b.order;
};

/* ---------------- Calendario: utilidades de fecha ---------------- */
const QUAD_RANK = { do: 0, plan: 1, deleg: 2, del: 3, null: 4 };
const YMD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parseDate = (s) => { const d = new Date(s); return isNaN(d) ? null : d; };
const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const WD_ES = ["Lu","Ma","Mi","Ju","Vi","Sá","Do"];
/* ordena por importancia (cuadrante) y luego por hora */
const byImportance = (a, b) => {
  const ra = QUAD_RANK[a.quadrant ?? "null"], rb = QUAD_RANK[b.quadrant ?? "null"];
  if (ra !== rb) return ra - rb;
  return byDue(a, b);
};
/* construye la matriz 6x7 del mes (lunes primero) */
function monthMatrix(year, month) {
  const first = new Date(year, month, 1);
  const startDow = (first.getDay() + 6) % 7; // 0 = lunes
  const start = new Date(year, month, 1 - startDow);
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    cells.push(d);
  }
  return cells;
}

/* ---------------- App ---------------- */
function App() {
  const [tasks, setTasks] = useState(load);
  const [tab, setTab] = useState("matriz");
  const [theme, setTheme] = useState(() => localStorage.getItem("prioridades-theme") || "light");
  const [title, setTitle] = useState("");
  const [note, setNote] = useState("");
  const [due, setDue] = useState("");
  const [mins, setMins] = useState(30);
  const [start, setStart] = useState(() => localStorage.getItem("prioridades-start") || "08:00");
  const [sheet, setSheet] = useState(null);   // tarea seleccionada (móvil)
  const [over, setOver] = useState(null);      // cuadrante con drag encima
  const dragId = useRef(null);
  const [calMonth, setCalMonth] = useState(() => { const n = new Date(); return { y: n.getFullYear(), m: n.getMonth() }; });
  const [calSel, setCalSel] = useState(() => YMD(new Date()));

  useEffect(() => { save(tasks); }, [tasks]);
  useEffect(() => { document.body.dataset.theme = theme; localStorage.setItem("prioridades-theme", theme); }, [theme]);
  useEffect(() => { localStorage.setItem("prioridades-start", start); }, [start]);
  useEffect(() => {
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
  }, []);

  /* --- acciones --- */
  const addTask = () => {
    const t = title.trim();
    if (!t) return;
    setTasks(prev => [...prev, {
      id: uid(), title: t, note: note.trim(), due: due || "", mins: mins,
      quadrant: null, status: "pendiente", order: Date.now()
    }]);
    setTitle(""); setNote(""); setDue(""); setMins(30);
    buzz();
  };
  const move = (id, quadrant) => { setTasks(p => p.map(x => x.id === id ? { ...x, quadrant } : x)); buzz(); };
  const toggleDone = (id) => {
    setTasks(p => p.map(x => x.id === id ? { ...x, status: x.status === "hecha" ? "pendiente" : "hecha" } : x));
    buzz(22);
  };
  const remove = (id) => { setTasks(p => p.filter(x => x.id !== id)); buzz(); };

  const counts = useMemo(() => {
    const c = { inbox:0, do:0, plan:0, deleg:0, del:0, done:0 };
    tasks.forEach(t => {
      if (t.status === "hecha") { c.done++; return; }
      if (!t.quadrant) c.inbox++;
      else c[t.quadrant]++;
    });
    return c;
  }, [tasks]);

  const inbox = useMemo(() => tasks.filter(t => !t.quadrant && t.status !== "hecha").sort(byDue), [tasks]);
  const pending = (q) => tasks.filter(t => t.quadrant === q && t.status !== "hecha").sort(byDue);

  /* --- drag & drop escritorio --- */
  const onDragStart = (e, id) => { dragId.current = id; e.dataTransfer.effectAllowed = "move"; };
  const onDropQuad = (q) => { if (dragId.current) move(dragId.current, q); dragId.current = null; setOver(null); };

  const logoSrc = theme === "dark" ? "assets/logo-horizontal-blanco.png" : "assets/logo-horizontal.png";

  return (
    <div className="app">
      <div className="shell">
        <div className="topbar">
          <img className="logo-h" src={logoSrc} alt="Hospital San Diego de Alcalá" />
          <div className="topbar-actions">
            <button className="icon-btn" onClick={() => setTheme(theme === "dark" ? "light" : "dark")} aria-label="Tema">
              {theme === "dark" ? I.sun : I.moon}
            </button>
          </div>
        </div>

        <div className="lead">
          <h1>Prioridades</h1>
          <p>Captura, clasifica con la matriz de Eisenhower y deja que tu día se ordene solo.</p>
        </div>

        <div className="tabs">
          <button className={"tab" + (tab==="matriz"?" active":"")} onClick={() => setTab("matriz")}>{I.grid} Matriz</button>
          <button className={"tab" + (tab==="dia"?" active":"")} onClick={() => setTab("dia")}>{I.cal} Mi día</button>
          <button className={"tab" + (tab==="calendario"?" active":"")} onClick={() => setTab("calendario")}>{I.month} Calendario</button>
          <button className={"tab" + (tab==="bandeja"?" active":"")} onClick={() => setTab("bandeja")}>
            {I.inbox} Bandeja {counts.inbox>0 && <span className="count">{counts.inbox}</span>}
          </button>
        </div>

        {tab === "bandeja" && (
          <BandejaView
            title={title} setTitle={setTitle} note={note} setNote={setNote} due={due} setDue={setDue}
            mins={mins} setMins={setMins}
            addTask={addTask} inbox={inbox} onPick={setSheet}
            onDragStart={onDragStart} dragId={dragId}
          />
        )}

        {tab === "matriz" && (
          <MatrixView
            inbox={inbox} pending={pending} counts={counts}
            onPick={setSheet} onDragStart={onDragStart} onDropQuad={onDropQuad}
            over={over} setOver={setOver} toggleDone={toggleDone} move={move} remove={remove}
          />
        )}

        {tab === "dia" && (
          <DiaView tasks={tasks} start={start} setStart={setStart} toggleDone={toggleDone} onPick={setSheet} />
        )}

        {tab === "calendario" && (
          <CalendarView
            tasks={tasks} calMonth={calMonth} setCalMonth={setCalMonth}
            calSel={calSel} setCalSel={setCalSel}
            toggleDone={toggleDone} onPick={setSheet}
          />
        )}

        <div className="foot">Hospital San Diego de Alcalá · Datos guardados solo en este dispositivo</div>
      </div>

      {sheet && (
        <Sheet
          task={sheet}
          onClose={() => setSheet(null)}
          onMove={(q) => { move(sheet.id, q); setSheet(null); }}
          onDone={() => { toggleDone(sheet.id); setSheet(null); }}
          onRemove={() => { remove(sheet.id); setSheet(null); }}
        />
      )}
    </div>
  );
}

/* ---------------- Chip de tarea ---------------- */
function Chip({ t, onPick, onDragStart, onToggle }) {
  const di = dueInfo(t.due);
  const done = t.status === "hecha";
  return (
    <div className={"chip" + (done ? " done" : "")} draggable
         onDragStart={(e) => onDragStart(e, t.id)}
         onClick={() => onPick(t)}>
      <span className="grip">{I.grip}</span>
      <div className="body">
        <div className="ttl">{t.title}</div>
        <div className="meta">
          <span className="mins-pill">{I.clock}{fmtMins(t.mins || 30)}</span>
          {di && <span className={"due" + (di.late && !done ? " late" : "")}>{di.text}</span>}
          {t.note && <span>· {t.note}</span>}
        </div>
      </div>
      {onToggle && (
        <div className="acts" onClick={(e) => e.stopPropagation()}>
          <button className={"mini ok" + (done ? " on" : "")} onClick={() => onToggle(t.id)} aria-label="Hecha">{I.check}</button>
        </div>
      )}
    </div>
  );
}

/* ---------------- Bandeja ---------------- */
function BandejaView({ title, setTitle, note, setNote, due, setDue, mins, setMins, addTask, inbox, onPick, onDragStart }) {
  return (
    <>
      <div className="quickadd">
        <div className="qa-row">
          <input className="qa-input" placeholder="Nueva tarea… (p. ej. Revisar expediente cama 4)"
                 value={title} onChange={e => setTitle(e.target.value)}
                 onKeyDown={e => e.key === "Enter" && addTask()} />
          <button className="qa-add" onClick={addTask} aria-label="Agregar">{I.plus}</button>
        </div>
        <div className="qa-extra">
          <input placeholder="Nota (opcional)" value={note} onChange={e => setNote(e.target.value)} />
          <input type="datetime-local" value={due} onChange={e => setDue(e.target.value)} aria-label="Fecha límite" />
          <label className="qa-mins">{I.clock}
            <select value={mins} onChange={e => setMins(Number(e.target.value))} aria-label="Duración estimada">
              {MINS.map(m => <option key={m} value={m}>{fmtMins(m)}</option>)}
            </select>
          </label>
        </div>
        <div className="qa-hint">Captúralas aquí sin pensar. La <b>duración</b> sirve para que <b>Mi día</b> arme los bloques. Después las clasificas en la <b>Matriz</b>.</div>
      </div>

      <div className="section-title">{I.inbox} Sin clasificar</div>
      {inbox.length === 0 ? (
        <div className="empty">{I.inbox}<p>Bandeja vacía. Agrega tu primera tarea arriba.</p></div>
      ) : (
        <div className="chips">
          {inbox.map(t => <Chip key={t.id} t={t} onPick={onPick} onDragStart={onDragStart} />)}
        </div>
      )}
    </>
  );
}

/* ---------------- Matriz ---------------- */
/* Orden visual de los cuadrantes (Q1 Q2 arriba · Q3 Q4 abajo, izq→der):
   arriba-izq = Q1 (Hacer ya) · arriba-der = Q2 (Agendar)
   abajo-izq  = Q3 (Delegar)  · abajo-der  = Q4 (Eliminar)
   Ejes: Importante↑ arriba, Urgente← izquierda. */
const QUAD_GRID = ["do","plan","deleg","del"];

function MatrixView({ inbox, pending, counts, onPick, onDragStart, onDropQuad, over, setOver, toggleDone, move, remove }) {
  const [openId, setOpenId] = useState(null);
  const renderQuad = (q, col, row) => {
    const Q = QUADS[q];
    const items = pending(q);
    return (
      <div key={q}
           className={"quad " + Q.cls + (over === q ? " over" : "")}
           style={{ gridColumn: col, gridRow: row }}
           onDragOver={(e) => { e.preventDefault(); setOver(q); }}
           onDragLeave={() => setOver(o => o === q ? null : o)}
           onDrop={(e) => { e.preventDefault(); onDropQuad(q); }}>
        <div className="quad-head">
          <div>
            <span className="quad-num">Q{Q.num}</span>
            <span className="quad-tag">{Q.icon}{Q.label}</span>
            <div className="quad-sub" style={{ marginTop: 4 }}>{Q.sub}</div>
          </div>
          {items.length > 0 && <span className="quad-n">{items.length}</span>}
        </div>
        {items.length === 0 ? (
          <div className="quad-empty">Suelta aquí → {Q.label}</div>
        ) : (
          <div className="chips">
            {items.map(t => (
              <MatrixChip key={t.id} t={t} q={q}
                open={openId === t.id}
                onToggleOpen={() => setOpenId(o => o === t.id ? null : t.id)}
                onDragStart={onDragStart} onMove={move} onDone={toggleDone} onRemove={remove} />
            ))}
          </div>
        )}
      </div>
    );
  };
  return (
    <>
      {inbox.length > 0 && (
        <div className="inbox-strip">
          <div className="section-title" style={{ margin: "0 2px 9px" }}>{I.inbox} Sin clasificar · arrastra o toca para clasificar</div>
          <div className="chips">
            {inbox.map(t => <Chip key={t.id} t={t} onPick={onPick} onDragStart={onDragStart} />)}
          </div>
        </div>
      )}

      <div className="matrix-table">
        {/* Esquina vacía */}
        <div className="mt-corner" />
        {/* Encabezado de columnas: Urgente | No urgente */}
        <div className="mt-colhead"><span className="ax-pill urgent">Urgente</span></div>
        <div className="mt-colhead"><span className="ax-pill nourgent">No urgente</span></div>

        {/* Fila Importante */}
        <div className="mt-rowhead"><span className="ax-pill important">Importante</span></div>
        {renderQuad("do", 2, 2)}
        {renderQuad("plan", 3, 2)}

        {/* Fila No importante */}
        <div className="mt-rowhead"><span className="ax-pill noimportant">No importante</span></div>
        {renderQuad("deleg", 2, 3)}
        {renderQuad("del", 3, 3)}
      </div>
      <div className="qa-hint" style={{ marginTop: 14, textAlign: "center" }}>
        Arrastra cada tarea al cuadrante según su <b>urgencia</b> (columna) e <b>importancia</b> (fila). Q1–Q4 de izquierda a derecha y de arriba abajo.
      </div>
    </>
  );
}

/* Tarjeta colapsable dentro de la matriz */
function MatrixChip({ t, q, open, onToggleOpen, onDragStart, onMove, onDone, onRemove }) {
  const di = dueInfo(t.due);
  const done = t.status === "hecha";
  return (
    <div className={"mchip" + (open ? " open" : "") + (done ? " done" : "")} draggable
         onDragStart={(e) => onDragStart(e, t.id)}>
      <div className="mchip-row" onClick={onToggleOpen}>
        <span className="grip">{I.grip}</span>
        <span className="mtitle">{t.title}</span>
        {di && di.late && !done && <span className="late-dot" title="Vencida" />}
        <span className="mmins">{fmtMins(t.mins || 30)}</span>
        <span className="chev">{open ? I.chevU : I.chevD}</span>
      </div>
      {open && (
        <div className="mchip-detail">
          <div className="mchip-fulltitle">{t.title}</div>
          {(di || t.note) && (
            <div className="meta">
              {di && <span className={"due" + (di.late && !done ? " late" : "")}>{I.clock}{di.text}</span>}
              {t.note && <span>· {t.note}</span>}
            </div>
          )}
          <div className="mchip-acts">
            {QUAD_ORDER.filter(k => k !== q).map(k => (
              <button key={k} className={"mact " + QUADS[k].cls} title={"Mover a " + QUADS[k].label}
                      onClick={() => onMove(t.id, k)}>{QUADS[k].icon}</button>
            ))}
            <button className="mact ok" title={done ? "Reabrir" : "Marcar hecha"} onClick={() => onDone(t.id)}>{done ? I.undo : I.check}</button>
            <button className="mact danger" title="Eliminar" onClick={() => onRemove(t.id)}>{I.trash}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------------- Mi día (agenda automática) ---------------- */
/* Una tarea pertenece a "hoy" si no tiene fecha, si es para hoy, o si ya está vencida.
   Las programadas para OTRO día (futuro) NO aparecen en Mi día: solo en el Calendario,
   hasta que llegue el día que les corresponde. */
const isForToday = (t, now = new Date()) => {
  if (!t.due) return true;
  const d = parseDate(t.due);
  if (!d) return true;
  return sameDay(d, now) || d < now;
};

function buildAgenda(tasks, start) {
  const active = tasks.filter(t => t.status !== "hecha" && isForToday(t));
  const doneToday = tasks.filter(t => t.status === "hecha" && isForToday(t));
  const doT = active.filter(t => t.quadrant === "do").sort(byDue);
  const planT = active.filter(t => t.quadrant === "plan").sort(byDue);
  const delegT = active.filter(t => t.quadrant === "deleg").sort(byDue);
  const delT = active.filter(t => t.quadrant === "del").sort(byDue);

  // Asigna bloques a "Hacer ya" + "Agendar" según la duración de cada tarea,
  // comenzando en la hora de inicio de jornada. El orden es por prioridad.
  let cur = (() => { const [h, m] = (start || "08:00").split(":").map(Number); return h * 60 + m; })();
  const fmt = (mm) => `${String(Math.floor(mm/60) % 24).padStart(2,"0")}:${String(mm % 60).padStart(2,"0")}`;
  const timed = [...doT, ...planT].map(t => {
    const dur = t.mins || 30;
    const startMin = cur;
    cur += dur;
    return { ...t, slot: fmt(startMin), endSlot: fmt(cur), kind: t.quadrant };
  });
  return { timed, delegT, delT, doneToday, total: active.length };
}

function DiaView({ tasks, start, setStart, toggleDone, onPick }) {
  const { timed, delegT, delT, doneToday, total } = useMemo(() => buildAgenda(tasks, start), [tasks, start]);
  const scheduledLater = useMemo(() => tasks.filter(t => t.status !== "hecha" && !isForToday(t)).length, [tasks]);

  if (total === 0 && doneToday.length === 0) {
    return (
      <div className="empty">{I.cal}
        <p>{scheduledLater > 0
          ? <>Hoy no hay tareas pendientes.<br/>Tienes <b>{scheduledLater}</b> programada(s) para otros días. míralas en el <b>Calendario</b>.</>
          : <>Aún no hay tareas clasificadas.<br/>Clasifícalas en la Matriz y aquí aparecerá tu día.</>}</p>
      </div>
    );
  }

  return (
    <>
      <div className="day-ctrl">
        <label>{I.clock} Inicio de jornada
          <input type="time" value={start} onChange={e => setStart(e.target.value)} />
        </label>
        <span className="quad-sub" style={{ color: "var(--ink-faint)" }}>{total} pendientes</span>
      </div>

      {timed.length > 0 && (
        <div className="day-block">
          <div className="section-title">{I.clock} Plan de hoy · enfoque por bloques</div>
          {timed.map(t => {
            const Q = QUADS[t.kind];
            const di = dueInfo(t.due);
            return (
              <div key={t.id} className="agenda-item" style={{ "--ac": "var(--" + Q.key + ")" }} onClick={() => onPick(t)}>
                <div className="agenda-time">{t.slot}<small>{fmtMins(t.mins || 30)}</small></div>
                <div className="agenda-body">
                  <div className="ttl">{t.title}</div>
                  <div className="meta">{Q.label} · hasta {t.endSlot}{di ? " · " + di.text : ""}{t.note ? " · " + t.note : ""}</div>
                </div>
                <div className="acts" onClick={e => e.stopPropagation()}>
                  <button className="mini ok" onClick={() => toggleDone(t.id)} aria-label="Hecha">{I.check}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {delegT.length > 0 && (
        <div className="day-block">
          <div className="section-title">{I.hand} Delegar · pásalas a alguien del equipo</div>
          {delegT.map(t => (
            <div key={t.id} className="agenda-item" style={{ "--ac": "var(--deleg)" }} onClick={() => onPick(t)}>
              <div className="agenda-time" style={{ minWidth: 40 }}>{I.hand}</div>
              <div className="agenda-body"><div className="ttl">{t.title}</div>{t.note && <div className="meta">{t.note}</div>}</div>
              <div className="acts" onClick={e => e.stopPropagation()}>
                <button className="mini ok" onClick={() => toggleDone(t.id)} aria-label="Hecha">{I.check}</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {delT.length > 0 && (
        <div className="day-block">
          <div className="section-title">{I.trash} Revisar y eliminar · quizá no aportan</div>
          {delT.map(t => (
            <div key={t.id} className="agenda-item" style={{ "--ac": "var(--del)", opacity: .8 }} onClick={() => onPick(t)}>
              <div className="agenda-time" style={{ minWidth: 40 }}>{I.trash}</div>
              <div className="agenda-body"><div className="ttl">{t.title}</div></div>
            </div>
          ))}
        </div>
      )}

      {doneToday.length > 0 && (
        <div className="day-block">
          <div className="section-title">{I.check} Completadas ({doneToday.length})</div>
          {doneToday.map(t => (
            <div key={t.id} className="agenda-item done" style={{ "--ac": "var(--plan)" }}>
              <div className="agenda-time" style={{ minWidth: 40, color: "var(--plan)" }}>{I.check}</div>
              <div className="agenda-body"><div className="ttl">{t.title}</div></div>
              <div className="acts">
                <button className="mini" onClick={() => toggleDone(t.id)} aria-label="Deshacer">{I.undo}</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

/* ---------------- Calendario ---------------- */
function CalendarView({ tasks, calMonth, setCalMonth, calSel, setCalSel, toggleDone, onPick }) {
  const today = new Date();
  const todayY = today.getFullYear(), todayM = today.getMonth(), todayD = today.getDate();

  /* mapa ymd -> { lista de tareas, set de cuadrantes } */
  const byDay = useMemo(() => {
    const map = {};
    tasks.forEach(t => {
      if (t.status === "hecha") return;
      const d = parseDate(t.due);
      if (!d) return;
      const key = YMD(d);
      if (!map[key]) map[key] = { list: [], quads: new Set() };
      map[key].list.push(t);
      map[key].quads.add(t.quadrant || "null");
    });
    return map;
  }, [tasks]);

  const cells = monthMatrix(calMonth.y, calMonth.m);

  const shiftMonth = (delta) => {
    let m = calMonth.m + delta, y = calMonth.y;
    if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; }
    setCalMonth({ y, m });
  };

  const goToday = () => {
    const n = new Date();
    setCalMonth({ y: n.getFullYear(), m: n.getMonth() });
    setCalSel(YMD(n));
  };

  const selDate = parseDate(calSel);
  const selDayItems = (byDay[calSel]?.list || []).slice().sort(byImportance);

  const selLabel = selDate
    ? `${selDate.getDate()} de ${MONTHS_ES[selDate.getMonth()].toLowerCase()}`
    : "";
  const selIsToday = selDate && sameDay(selDate, today);
  const selIsPast = selDate && !selIsToday && selDate < today && sameDay(selDate, new Date(selDate.getTime()));

  return (
    <>
      {/* Encabezado con mes y navegación */}
      <div className="cal-head">
        <div className="cal-month">{MONTHS_ES[calMonth.m]} {calMonth.y}</div>
        <div className="cal-nav">
          <button className="cal-nav-btn today" onClick={goToday} aria-label="Ir a hoy">Hoy</button>
          <button className="cal-nav-btn" onClick={() => shiftMonth(-1)} aria-label="Mes anterior">{I.chevL}</button>
          <button className="cal-nav-btn" onClick={() => shiftMonth(1)} aria-label="Mes siguiente">{I.chevR}</button>
        </div>
      </div>

      {/* Rejilla del calendario */}
      <div className="cal-wrap">
        <div className="cal-week">
          {WD_ES.map(w => <div key={w} className="cal-wd">{w}</div>)}
        </div>
        <div className="cal-grid">
          {cells.map((d, i) => {
            const key = YMD(d);
            const info = byDay[key];
            const out = d.getMonth() !== calMonth.m;
            const isToday = d.getFullYear()===todayY && d.getMonth()===todayM && d.getDate()===todayD;
            const isSel = key === calSel;
            const quads = info ? Array.from(info.quads).filter(q => q !== "null") : [];
            return (
              <div key={i}
                   className={"cal-cell" + (out ? " out" : "") + (info ? " has" : "") + (isSel ? " sel" : "") + (isToday ? " today" : "")}
                   onClick={() => setCalSel(key)}>
                <span className="dnum">{d.getDate()}</span>
                {quads.length > 0 && (
                  <span className="dots">
                    {quads.map(q => <span key={q} className={"dot " + q} />)}
                  </span>
                )}
              </div>
            );
          })}
        </div>
        <div className="cal-legend">
          <span className="cal-legend-item"><span className="sw do" />Hacer ya</span>
          <span className="cal-legend-item"><span className="sw plan" />Agendar</span>
          <span className="cal-legend-item"><span className="sw deleg" />Delegar</span>
          <span className="cal-legend-item"><span className="sw del" />Eliminar</span>
        </div>
      </div>

      {/* Lista de tareas del día seleccionado */}
      <div className="cal-day-title">
        <span className="big">{selLabel || "Selecciona un día"}</span>
        <span className="small">{selIsToday ? "Hoy" : (selDate ? (selDate < today ? "Fecha pasada" : "") : "")}</span>
        {selDayItems.length > 0 && <span className="n">{selDayItems.length}</span>}
      </div>

      {selDayItems.length === 0 ? (
        <div className="empty">{I.month}<p>{selDate ? "Sin tareas programadas para este día." : "Toca un día del calendario para ver sus tareas."}</p></div>
      ) : (
        <div className="day-block">
          <div className="chips">
            {selDayItems.map(t => {
              const Q = QUADS[t.quadrant] || { label: "SIN CLASIFICAR", key: "del", cls: "q-del" };
              const di = dueInfo(t.due);
              return (
                <div key={t.id} className="agenda-item" style={{ "--ac": "var(--" + Q.key + ")" }} onClick={() => onPick(t)}>
                  <div className="agenda-time" style={{ minWidth: 40 }}>{Q.icon}</div>
                  <div className="agenda-body">
                    <div className="ttl">{t.title}</div>
                    <div className="meta">{Q.label}{di ? " · " + di.text : ""}{t.note ? " · " + t.note : ""}</div>
                  </div>
                  <div className="acts" onClick={e => e.stopPropagation()}>
                    <button className="mini ok" onClick={() => toggleDone(t.id)} aria-label="Hecha">{I.check}</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="qa-hint" style={{ marginTop: 14, textAlign: "center" }}>
        Aquí aparecen las tareas con <b>fecha límite</b>, ordenadas por importancia. Asigna fecha desde la <b>Bandeja</b>.
      </div>
    </>
  );
}

/* ---------------- Action sheet (móvil) ---------------- */
function Sheet({ task, onClose, onMove, onDone, onRemove }) {
  const di = dueInfo(task.due);
  const done = task.status === "hecha";
  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <h3>{task.title}</h3>
        <div className="sub">{fmtMins(task.mins || 30)}{di ? " · " + di.text : ""}{task.note ? " · " + task.note : ""}</div>
        <div className="sheet-grid">
          {QUAD_GRID.map(q => {
            const Q = QUADS[q];
            return (
              <button key={q} className={"sheet-opt " + Q.cls} onClick={() => onMove(q)}>
                <span className="sheet-q">Q{Q.num}</span>{Q.label}<small>{Q.sub}</small>
              </button>
            );
          })}
        </div>
        <div className="sheet-row">
          <button className="sheet-btn" onClick={onDone}>{done ? I.undo : I.check}{done ? "Reabrir" : "Marcar hecha"}</button>
          <button className="sheet-btn danger" onClick={onRemove}>{I.trash}Eliminar</button>
        </div>
        <button className="sheet-close" onClick={onClose}>Cerrar</button>
      </div>
    </div>
  );
}
